main:
  params: [args]
  steps:
    - init_base:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - workflow_id: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_ID")}
          - workflow_execution_id: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
          - orchestration_log_url: ${"https://console.cloud.google.com/workflows/workflow/" + region + "/" + workflow_id + "/executions/" + workflow_execution_id + "?project=" + project_id}
          - control_service_url: "__PIPELINE_CONTROL_URL__"
          - dag_id: "ashare_warehouse_window_refresh"
          - pipeline_run_id: ${workflow_execution_id}
          - transform_backend: "bigquery_sql"
          - bq_location: "asia-east2"
          - run_label: null
          - warehouse_mode: null
          - pipeline_dry_run: null
          - business_date: null
          - date_from: null
          - date_to: null
          - upstream_pipeline_run_id: null
          - triggered_by_dag_id: null
          - current_task_id: null
          - current_task_type: null
          - current_error_summary: null
          - current_error_payload: null
          - lock_name: "ashare_warehouse_window_refresh"
          - lock_owner: ${workflow_execution_id}
          - lock_lease_seconds: 1800
          - qa_task_prefix: "qa_after_window"
          - input_business_date: ${map.get(args, "business_date")}
          - input_date_from: ${map.get(args, "date_from")}
          - input_date_to: ${map.get(args, "date_to")}
          - input_run_label: ${map.get(args, "run_label")}
          - input_warehouse_mode: ${map.get(args, "warehouse_mode")}
          - input_pipeline_dry_run: ${map.get(args, "pipeline_dry_run")}
          - input_upstream_pipeline_run_id: ${map.get(args, "upstream_pipeline_run_id")}
          - input_triggered_by_dag_id: ${map.get(args, "triggered_by_dag_id")}
    - resolve_business_date:
        switch:
          - condition: ${input_business_date == null or input_business_date == ""}
            next: set_business_date_default
        next: set_business_date_input
    - set_business_date_default:
        assign:
          - business_date: ${text.substring(time.format(sys.now(), "Asia/Shanghai"), 0, 10)}
        next: resolve_date_from
    - set_business_date_input:
        assign:
          - business_date: ${input_business_date}
        next: resolve_date_from
    - resolve_date_from:
        switch:
          - condition: ${input_date_from == null}
            next: set_date_from_empty
        next: set_date_from_input
    - set_date_from_empty:
        assign:
          - date_from: ""
        next: resolve_date_to
    - set_date_from_input:
        assign:
          - date_from: ${input_date_from}
        next: resolve_date_to
    - resolve_date_to:
        switch:
          - condition: ${input_date_to == null or input_date_to == ""}
            next: set_date_to_default
        next: set_date_to_input
    - set_date_to_default:
        assign:
          - date_to: ${business_date}
        next: resolve_run_label
    - set_date_to_input:
        assign:
          - date_to: ${input_date_to}
        next: resolve_run_label
    - resolve_run_label:
        switch:
          - condition: ${input_run_label == null or input_run_label == ""}
            next: set_run_label_default
        next: set_run_label_input
    - set_run_label_default:
        assign:
          - run_label: "warehouse_window_refresh"
        next: resolve_warehouse_mode
    - set_run_label_input:
        assign:
          - run_label: ${input_run_label}
        next: resolve_warehouse_mode
    - resolve_warehouse_mode:
        switch:
          - condition: ${input_warehouse_mode == null or input_warehouse_mode == ""}
            next: set_warehouse_mode_default
        next: set_warehouse_mode_input
    - set_warehouse_mode_default:
        assign:
          - warehouse_mode: "daily_current"
        next: resolve_pipeline_dry_run
    - set_warehouse_mode_input:
        assign:
          - warehouse_mode: ${text.to_lower(input_warehouse_mode)}
        next: resolve_pipeline_dry_run
    - resolve_pipeline_dry_run:
        switch:
          - condition: ${input_pipeline_dry_run == null or input_pipeline_dry_run == ""}
            next: set_pipeline_dry_run_default
        next: set_pipeline_dry_run_input
    - set_pipeline_dry_run_default:
        assign:
          - pipeline_dry_run: "true"
        next: resolve_upstream_pipeline_run_id
    - set_pipeline_dry_run_input:
        assign:
          - pipeline_dry_run: ${input_pipeline_dry_run}
        next: resolve_upstream_pipeline_run_id
    - resolve_upstream_pipeline_run_id:
        switch:
          - condition: ${input_upstream_pipeline_run_id == null}
            next: set_upstream_pipeline_run_id_empty
        next: set_upstream_pipeline_run_id_input
    - set_upstream_pipeline_run_id_empty:
        assign:
          - upstream_pipeline_run_id: ""
        next: resolve_triggered_by_dag_id
    - set_upstream_pipeline_run_id_input:
        assign:
          - upstream_pipeline_run_id: ${input_upstream_pipeline_run_id}
        next: resolve_triggered_by_dag_id
    - resolve_triggered_by_dag_id:
        switch:
          - condition: ${input_triggered_by_dag_id == null}
            next: set_triggered_by_dag_id_empty
        next: set_triggered_by_dag_id_input
    - set_triggered_by_dag_id_empty:
        assign:
          - triggered_by_dag_id: ""
        next: orchestrate
    - set_triggered_by_dag_id_input:
        assign:
          - triggered_by_dag_id: ${input_triggered_by_dag_id}
        next: orchestrate
    - orchestrate:
        try:
          steps:
            - set_task_start:
                assign:
                  - current_task_id: "start"
                  - current_task_type: "orchestration"
            - mark_start_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_setup:
                assign:
                  - current_task_id: "setup"
                  - current_task_type: "orchestration"
            - mark_setup_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_pipeline_start_status:
                assign:
                  - current_task_id: "pipeline_start_status"
                  - current_task_type: "metadata"
            - write_pipeline_run_running:
                call: write_pipeline_run_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  upstream_pipeline_run_id: ${upstream_pipeline_run_id}
                  triggered_by_dag_id: ${triggered_by_dag_id}
                  status: "running"
                  error_summary: null
                  error_payload: null
            - mark_pipeline_start_status_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_ods_readiness:
                assign:
                  - current_task_id: "ods_daily_partition_readiness"
                  - current_task_type: "bigquery"
            - run_ods_readiness:
                call: run_bigquery_task
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  sql_path: "sql/qa/09_ods_daily_partition_readiness.sql"
                  query_parameters:
                    - name: "pipeline_run_id"
                      type: "STRING"
                      value: ${pipeline_run_id}
                    - name: "business_date"
                      type: "STRING"
                      value: ${business_date}
                    - name: "pipeline_dry_run"
                      type: "STRING"
                      value: ${pipeline_dry_run}
                    - name: "require_business_partition"
                      type: "STRING"
                      value: ""
                  location: ${bq_location}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
            - set_task_branch_window_refresh:
                assign:
                  - current_task_id: "branch_window_refresh"
                  - current_task_type: "branch"
            - mark_branch_window_refresh_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - branch_window_refresh:
                switch:
                  - condition: ${warehouse_mode == "full_rebuild" or warehouse_mode == "full_rebuild_compat"}
                    next: fail_full_rebuild_not_implemented
                  - condition: ${warehouse_mode == "qa_only"}
                    next: set_qa_only_prefix
                  - condition: ${pipeline_dry_run == "true" or pipeline_dry_run == true or warehouse_mode == "skip_window_refresh"}
                    next: skip_window_refresh_path
                next: acquire_window_lock
            - fail_full_rebuild_not_implemented:
                raise:
                  message: "full_rebuild and full_rebuild_compat are not implemented in Workflows phase 1"
                  warehouse_mode: ${warehouse_mode}
            - set_qa_only_prefix:
                assign:
                  - qa_task_prefix: "qa_only"
                next: run_qa_only_core_smoke_checks
            - skip_window_refresh_path:
                assign:
                  - current_task_id: "skip_window_refresh"
                  - current_task_type: "orchestration"
                next: mark_skip_window_refresh
            - mark_skip_window_refresh:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "skipped"
                  error_summary: "window refresh skipped by pipeline_dry_run or explicit skip mode"
                  error_payload: null
                  resource_name: null
                next: finalize_pipeline_success
            - acquire_window_lock:
                assign:
                  - current_task_id: "window_refresh_lock"
                  - current_task_type: "orchestration"
            - lock_acquire_call:
                call: acquire_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
                  lease_seconds: ${lock_lease_seconds}
            - set_task_dim_trade_calendar:
                assign:
                  - current_task_id: "windowed_transform.dim_trade_calendar"
                  - current_task_type: "bigquery"
            - run_dim_trade_calendar:
                call: run_bigquery_task
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  sql_path: "sql/dim/01_dim_trade_calendar.sql"
                  query_parameters: []
                  location: ${bq_location}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
            - heartbeat_after_dim_trade_calendar:
                call: heartbeat_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
                  lease_seconds: ${lock_lease_seconds}
            - set_task_dim_stock:
                assign:
                  - current_task_id: "windowed_transform.dim_stock"
                  - current_task_type: "bigquery"
