main:
  params: [args]
  steps:
    - init_base:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - workflow_id: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_ID")}
          - workflow_execution_id: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
          - control_service_url: "__PIPELINE_CONTROL_URL__"
          - run_label: null
          - lookback_minutes: null
          - write_log: null
          - write_heartbeat: null
          - input_run_label: ${map.get(args, "run_label")}
          - input_lookback_minutes: ${map.get(args, "lookback_minutes")}
          - input_write_log: ${map.get(args, "write_log")}
          - input_write_heartbeat: ${map.get(args, "write_heartbeat")}
    - resolve_run_label:
        switch:
          - condition: ${input_run_label == null or input_run_label == ""}
            next: set_run_label_default
        next: set_run_label_input
    - set_run_label_default:
        assign:
          - run_label: "alert_checker"
        next: resolve_lookback_minutes
    - set_run_label_input:
        assign:
          - run_label: ${input_run_label}
        next: resolve_lookback_minutes
    - resolve_lookback_minutes:
        switch:
          - condition: ${input_lookback_minutes == null or input_lookback_minutes == ""}
            next: set_lookback_minutes_default
        next: set_lookback_minutes_input
    - set_lookback_minutes_default:
        assign:
          - lookback_minutes: 70
        next: resolve_write_log
    - set_lookback_minutes_input:
        assign:
          - lookback_minutes: ${int(input_lookback_minutes)}
        next: resolve_write_log
    - resolve_write_log:
        switch:
          - condition: ${input_write_log == null or input_write_log == ""}
            next: set_write_log_default
        next: set_write_log_input
    - set_write_log_default:
        assign:
          - write_log: "true"
        next: resolve_write_heartbeat
    - set_write_log_input:
        assign:
          - write_log: ${text.to_lower(string(input_write_log))}
        next: resolve_write_heartbeat
    - resolve_write_heartbeat:
        switch:
          - condition: ${input_write_heartbeat == null or input_write_heartbeat == ""}
            next: set_write_heartbeat_default
        next: set_write_heartbeat_input
    - set_write_heartbeat_default:
        assign:
          - write_heartbeat: "true"
        next: invoke_alert_check
    - set_write_heartbeat_input:
        assign:
          - write_heartbeat: ${text.to_lower(string(input_write_heartbeat))}
        next: invoke_alert_check
    - invoke_alert_check:
        call: http.post
        args:
          url: ${control_service_url + "/v1/tasks/alert-check"}
          timeout: 300
          auth:
            type: OIDC
          body:
            project_id: ${project_id}
            lookback_minutes: ${lookback_minutes}
            write_log: ${write_log == "true"}
            write_heartbeat: ${write_heartbeat == "true"}
        result: alert_check_response
    - return_success:
        return:
          workflow_id: ${workflow_id}
          workflow_execution_id: ${workflow_execution_id}
          run_label: ${run_label}
          lookback_minutes: ${lookback_minutes}
          alerts_count: ${map.get(alert_check_response.body, "alerts_count")}
          log_entries_written: ${map.get(alert_check_response.body, "log_entries_written")}
          status: ${map.get(alert_check_response.body, "status")}
