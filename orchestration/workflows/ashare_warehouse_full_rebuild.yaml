                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
            - heartbeat_after_qa_finance_caliber_checks:
                call: heartbeat_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
                  lease_seconds: ${lock_lease_seconds}
            - set_task_qa_unit_contract_checks:
                assign:
                  - current_task_id: "qa.unit_contract_checks"
                  - current_task_type: "bigquery"
            - run_qa_unit_contract_checks:
                call: run_bigquery_task
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  sql_path: "sql/qa/05_unit_contract_checks.sql"
                  query_parameters:                    []
                  location: ${bq_location}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
            - heartbeat_after_qa_unit_contract_checks:
                call: heartbeat_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
                  lease_seconds: ${lock_lease_seconds}
            - release_full_rebuild_lock_success:
                assign:
                  - current_task_id: "warehouse_write_lock"
                  - current_task_type: "orchestration"
            - release_full_rebuild_lock_success_call:
                call: release_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
            - mark_full_rebuild_lock_released:
                assign:
                  - lock_acquired: "false"
                next: finalize_pipeline_success
            - finalize_pipeline_success:
                assign:
                  - current_task_id: "pipeline_finalize_status"
                  - current_task_type: "metadata"
            - write_pipeline_run_success:
                call: write_pipeline_run_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  upstream_pipeline_run_id: ${upstream_pipeline_run_id}
                  triggered_by_dag_id: ${triggered_by_dag_id}
                  status: "success"
                  error_summary: null
                  error_payload: null
            - mark_pipeline_finalize_status_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_finish:
                assign:
                  - current_task_id: "finish"
                  - current_task_type: "orchestration"
            - mark_finish_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
        except:
          as: e
          steps:
            - set_failure_error_fields:
                assign:
                  - current_error_summary: ${text.substring(json.encode_to_string(e), 0, 1000)}
                  - current_error_payload: ${e}
            - maybe_release_lock_on_error:
                switch:
                  - condition: ${lock_acquired == "true"}
                    next: release_lock_on_error
                next: write_pipeline_run_failed
            - release_lock_on_error:
                try:
                  call: release_lock
                  args:
                    control_service_url: ${control_service_url}
                    lock_name: ${lock_name}
                    owner: ${lock_owner}
                except:
                  as: release_error
                  steps:
                    - ignore_release_error:
                        assign:
                          - ignored_release_error: ${release_error}
                next: mark_lock_released_after_error
            - mark_lock_released_after_error:
                assign:
                  - lock_acquired: "false"
                next: write_pipeline_run_failed
            - write_pipeline_run_failed:
                call: write_pipeline_run_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  upstream_pipeline_run_id: ${upstream_pipeline_run_id}
                  triggered_by_dag_id: ${triggered_by_dag_id}
                  status: "failed"
                  error_summary: ${current_error_summary}
                  error_payload: ${current_error_payload}
            - maybe_write_failed_task_status:
                switch:
                  - condition: ${current_task_id != null}
                    next: write_failed_task_status
                next: rethrow_error
            - write_failed_task_status:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "failed"
                  error_summary: ${current_error_summary}
                  error_payload: ${current_error_payload}
                  resource_name: null
            - rethrow_error:
                raise: ${e}
    - return_success:
        return:
          dag_id: ${dag_id}
          pipeline_run_id: ${pipeline_run_id}
          workflow_id: ${workflow_id}
          workflow_execution_id: ${workflow_execution_id}
          business_date: ${business_date}
          date_from: ${date_from}
          date_to: ${date_to}
          warehouse_mode: ${warehouse_mode}
          run_label: ${run_label}

write_pipeline_run_status:
  params: [control_service_url, dag_id, pipeline_run_id, business_date, date_from, date_to, run_label, warehouse_mode, transform_backend, workflow_id, workflow_execution_id, orchestration_log_url, upstream_pipeline_run_id, triggered_by_dag_id, status, error_summary, error_payload]
  steps:
    - post_status:
        call: http.post
        args:
          url: ${control_service_url + "/v1/pipeline-runs/status"}
          auth:
            type: OIDC
          body:
            dag_id: ${dag_id}
            pipeline_run_id: ${pipeline_run_id}
            business_date: ${business_date}
            date_from: ${date_from}
            date_to: ${date_to}
            run_label: ${run_label}
            warehouse_mode: ${warehouse_mode}
            transform_backend: ${transform_backend}
            workflow_id: ${workflow_id}
            workflow_execution_id: ${workflow_execution_id}
            orchestration_log_url: ${orchestration_log_url}
            upstream_pipeline_run_id: ${upstream_pipeline_run_id}
            triggered_by_dag_id: ${triggered_by_dag_id}
            status: ${status}
            error_summary: ${error_summary}
            error_payload: ${error_payload}
        result: pipeline_run_status_response
    - return_pipeline_run_status:
        return: ${pipeline_run_status_response.body}

write_task_status:
  params: [control_service_url, dag_id, pipeline_run_id, task_id, task_type, business_date, date_from, date_to, run_label, warehouse_mode, transform_backend, workflow_id, workflow_execution_id, orchestration_log_url, endpoint, status, error_summary, error_payload, resource_name]
  steps:
    - post_task_status:
        call: http.post
        args:
          url: ${control_service_url + "/v1/tasks/status"}
          auth:
            type: OIDC
          body:
            dag_id: ${dag_id}
            pipeline_run_id: ${pipeline_run_id}
            task_id: ${task_id}
            task_type: ${task_type}
            business_date: ${business_date}
            date_from: ${date_from}
            date_to: ${date_to}
            run_label: ${run_label}
            warehouse_mode: ${warehouse_mode}
            transform_backend: ${transform_backend}
            workflow_id: ${workflow_id}
            workflow_execution_id: ${workflow_execution_id}
            orchestration_log_url: ${orchestration_log_url}
            endpoint: ${endpoint}
            status: ${status}
            error_summary: ${error_summary}
            error_payload: ${error_payload}
            resource_name: ${resource_name}
        result: task_status_response
    - return_task_status:
        return: ${task_status_response.body}

run_bigquery_task:
  params: [control_service_url, dag_id, pipeline_run_id, task_id, task_type, sql_path, query_parameters, location, business_date, date_from, date_to, run_label, warehouse_mode, transform_backend, workflow_id, workflow_execution_id, orchestration_log_url]
  steps:
    - submit_bigquery_task:
        try:
          call: http.post
          args:
            url: ${control_service_url + "/v1/tasks/bigquery/submit"}
            timeout: 300
            auth:
              type: OIDC
            body:
              task_id: ${task_id}
              task_type: ${task_type}
              sql_path: ${sql_path}
              query_parameters: ${query_parameters}
              location: ${location}
              endpoint: "/v1/tasks/bigquery/submit"
              context:
                dag_id: ${dag_id}
                pipeline_run_id: ${pipeline_run_id}
                business_date: ${business_date}
                date_from: ${date_from}
                date_to: ${date_to}
                run_label: ${run_label}
                warehouse_mode: ${warehouse_mode}
                transform_backend: ${transform_backend}
                workflow_id: ${workflow_id}
                workflow_execution_id: ${workflow_execution_id}
                orchestration_log_url: ${orchestration_log_url}
          result: submit_bigquery_task_response
        retry:
          predicate: ${http.default_retry_predicate}
          max_retries: 5
          backoff:
            initial_delay: 2
            max_delay: 30
            multiplier: 2
    - set_bigquery_poll_state:
        assign:
          - bigquery_job_id: ${submit_bigquery_task_response.body.result.job_id}
          - bigquery_poll_interval_seconds: 60
          - bigquery_poll_count: 0
          - bigquery_max_polls: 1440
    - poll_bigquery_task:
        try:
          call: http.post
          args:
            url: ${control_service_url + "/v1/tasks/bigquery/poll"}
            timeout: 300
            auth:
              type: OIDC
            body:
              task_id: ${task_id}
              task_type: ${task_type}
              job_id: ${bigquery_job_id}
              location: ${location}
              endpoint: "/v1/tasks/bigquery/poll"
              context:
                dag_id: ${dag_id}
                pipeline_run_id: ${pipeline_run_id}
                business_date: ${business_date}
                date_from: ${date_from}
                date_to: ${date_to}
                run_label: ${run_label}
                warehouse_mode: ${warehouse_mode}
                transform_backend: ${transform_backend}
                workflow_id: ${workflow_id}
                workflow_execution_id: ${workflow_execution_id}
                orchestration_log_url: ${orchestration_log_url}
          result: poll_bigquery_task_response
        retry:
          predicate: ${http.default_retry_predicate}
          max_retries: 5
          backoff:
            initial_delay: 2
            max_delay: 30
            multiplier: 2
    - check_bigquery_task_done:
        switch:
          - condition: ${poll_bigquery_task_response.body.result.done}
            next: return_bigquery_task
        next: increment_bigquery_poll_count
    - increment_bigquery_poll_count:
        assign:
          - bigquery_poll_count: ${bigquery_poll_count + 1}
        next: check_bigquery_poll_limit
    - check_bigquery_poll_limit:
        switch:
          - condition: ${bigquery_poll_count > bigquery_max_polls}
            next: raise_bigquery_poll_limit_exceeded
        next: heartbeat_lock_while_bigquery_polling
    - raise_bigquery_poll_limit_exceeded:
        raise: ${"bigquery poll exceeded max attempts for task " + task_id + " job " + bigquery_job_id}
    - heartbeat_lock_while_bigquery_polling:
        call: heartbeat_lock
        args:
          control_service_url: ${control_service_url}
          lock_name: "ashare_warehouse_window_refresh"
          owner: ${workflow_execution_id}
          lease_seconds: 21600
    - sleep_before_next_bigquery_poll:
        call: sys.sleep
        args:
          seconds: ${bigquery_poll_interval_seconds}
        next: poll_bigquery_task
    - return_bigquery_task:
        return: ${poll_bigquery_task_response.body.result}

acquire_lock:
  params: [control_service_url, lock_name, owner, lease_seconds]
  steps:
    - post_acquire_lock:
        call: http.post
        args:
          url: ${control_service_url + "/v1/locks/acquire"}
          auth:
            type: OIDC
          body:
