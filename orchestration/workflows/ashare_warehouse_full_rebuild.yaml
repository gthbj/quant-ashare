main:
  params: [args]
  steps:
    - init_base:
        assign:
          - project_id: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - workflow_id: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_ID")}
          - workflow_execution_id: ${sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")}
          - orchestration_log_url: ${"https://console.cloud.google.com/workflows/workflow/" + region + "/" + workflow_id + "/executions/" + workflow_execution_id + "?project=" + project_id}
          - control_service_url: "__PIPELINE_CONTROL_URL__"
          - dag_id: "ashare_warehouse_full_rebuild"
          - pipeline_run_id: ${workflow_execution_id}
          - transform_backend: "bigquery_sql"
          - bq_location: "asia-east2"
          - run_label: null
          - warehouse_mode: null
          - pipeline_dry_run: null
          - confirm_full_rebuild: null
          - business_date: null
          - date_from: null
          - date_to: null
          - upstream_pipeline_run_id: ""
          - triggered_by_dag_id: ""
          - current_task_id: null
          - current_task_type: null
          - current_error_summary: null
          - current_error_payload: null
          - lock_name: "ashare_warehouse_window_refresh"
          - lock_owner: ${workflow_execution_id}
          - lock_lease_seconds: 21600
          - lock_acquired: "false"
          - input_business_date: ${map.get(args, "business_date")}
          - input_date_from: ${map.get(args, "date_from")}
          - input_date_to: ${map.get(args, "date_to")}
          - input_run_label: ${map.get(args, "run_label")}
          - input_warehouse_mode: ${map.get(args, "warehouse_mode")}
          - input_pipeline_dry_run: ${map.get(args, "pipeline_dry_run")}
          - input_confirm_full_rebuild: ${map.get(args, "confirm_full_rebuild")}
    - resolve_date_from:
        switch:
          - condition: ${input_date_from == null}
            next: set_date_from_empty
        next: set_date_from_input
    - set_date_from_empty:
        assign:
          - date_from: ""
        next: resolve_date_to
    - set_date_from_input:
        assign:
          - date_from: ${input_date_from}
        next: resolve_date_to
    - resolve_date_to:
        switch:
          - condition: ${input_date_to == null}
            next: set_date_to_empty
        next: set_date_to_input
    - set_date_to_empty:
        assign:
          - date_to: ""
        next: resolve_business_date
    - set_date_to_input:
        assign:
          - date_to: ${input_date_to}
        next: resolve_business_date
    - resolve_business_date:
        switch:
          - condition: ${input_business_date == null or input_business_date == ""}
            next: set_business_date_default
        next: set_business_date_input
    - set_business_date_default:
        assign:
          - business_date: ${date_to}
        next: resolve_run_label
    - set_business_date_input:
        assign:
          - business_date: ${input_business_date}
        next: resolve_run_label
    - resolve_run_label:
        switch:
          - condition: ${input_run_label == null or input_run_label == ""}
            next: set_run_label_default
        next: set_run_label_input
    - set_run_label_default:
        assign:
          - run_label: "manual_full_rebuild"
        next: resolve_warehouse_mode
    - set_run_label_input:
        assign:
          - run_label: ${input_run_label}
        next: resolve_warehouse_mode
    - resolve_warehouse_mode:
        switch:
          - condition: ${input_warehouse_mode == null or input_warehouse_mode == ""}
            next: set_warehouse_mode_default
        next: set_warehouse_mode_input
    - set_warehouse_mode_default:
        assign:
          - warehouse_mode: "full_rebuild"
        next: resolve_pipeline_dry_run
    - set_warehouse_mode_input:
        assign:
          - warehouse_mode: ${text.to_lower(input_warehouse_mode)}
        next: resolve_pipeline_dry_run
    - resolve_pipeline_dry_run:
        switch:
          - condition: ${input_pipeline_dry_run == null or string(input_pipeline_dry_run) == ""}
            next: set_pipeline_dry_run_default
        next: set_pipeline_dry_run_input
    - set_pipeline_dry_run_default:
        assign:
          - pipeline_dry_run: "true"
        next: resolve_confirm_full_rebuild
    - set_pipeline_dry_run_input:
        assign:
          - pipeline_dry_run: ${text.to_lower(string(input_pipeline_dry_run))}
        next: resolve_confirm_full_rebuild
    - resolve_confirm_full_rebuild:
        switch:
          - condition: ${input_confirm_full_rebuild == null or string(input_confirm_full_rebuild) == ""}
            next: set_confirm_full_rebuild_default
        next: set_confirm_full_rebuild_input
    - set_confirm_full_rebuild_default:
        assign:
          - confirm_full_rebuild: "false"
        next: orchestrate
    - set_confirm_full_rebuild_input:
        assign:
          - confirm_full_rebuild: ${text.to_lower(string(input_confirm_full_rebuild))}
        next: orchestrate
    - orchestrate:
        try:
          steps:
            - set_task_start:
                assign:
                  - current_task_id: "start"
                  - current_task_type: "orchestration"
            - mark_start_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_setup:
                assign:
                  - current_task_id: "setup"
                  - current_task_type: "orchestration"
            - mark_setup_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_pipeline_start_status:
                assign:
                  - current_task_id: "pipeline_start_status"
                  - current_task_type: "metadata"
            - write_pipeline_run_running:
                call: write_pipeline_run_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  upstream_pipeline_run_id: ${upstream_pipeline_run_id}
                  triggered_by_dag_id: ${triggered_by_dag_id}
                  status: "running"
                  error_summary: null
                  error_payload: null
            - mark_pipeline_start_status_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - set_task_confirm_full_rebuild:
                assign:
                  - current_task_id: "confirm_full_rebuild"
                  - current_task_type: "orchestration"
            - validate_confirm_full_rebuild:
                switch:
                  - condition: ${confirm_full_rebuild != "true"}
                    next: fail_missing_confirm_full_rebuild
                  - condition: ${warehouse_mode != "full_rebuild" and warehouse_mode != "full_rebuild_compat"}
                    next: fail_invalid_full_rebuild_mode
                  - condition: ${date_from == "" or date_to == ""}
                    next: fail_missing_full_rebuild_dates
                next: mark_confirm_full_rebuild_success
            - fail_missing_confirm_full_rebuild:
                raise: "confirm_full_rebuild=true is required for ashare_warehouse_full_rebuild"
            - fail_invalid_full_rebuild_mode:
                raise: ${"warehouse_mode must be full_rebuild or full_rebuild_compat, got " + warehouse_mode}
            - fail_missing_full_rebuild_dates:
                raise: "date_from and date_to are required for ashare_warehouse_full_rebuild"
            - mark_confirm_full_rebuild_success:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
            - branch_full_rebuild:
                switch:
                  - condition: ${pipeline_dry_run == "true"}
                    next: set_task_skip_full_rebuild_write
                next: acquire_full_rebuild_lock
            - set_task_skip_full_rebuild_write:
                assign:
                  - current_task_id: "skip_full_rebuild_write"
                  - current_task_type: "orchestration"
            - mark_skip_full_rebuild_write:
                call: write_task_status
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
                  endpoint: ""
                  status: "success"
                  error_summary: null
                  error_payload: null
                  resource_name: null
                next: finalize_pipeline_success
            - acquire_full_rebuild_lock:
                assign:
                  - current_task_id: "warehouse_write_lock"
                  - current_task_type: "orchestration"
            - acquire_full_rebuild_lock_call:
                call: acquire_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
                  lease_seconds: ${lock_lease_seconds}
            - mark_full_rebuild_lock_acquired:
                assign:
                  - lock_acquired: "true"
            - set_task_qa_ods_parquet_schema_p0:
                assign:
                  - current_task_id: "qa.ods_parquet_schema_p0"
                  - current_task_type: "bigquery"
            - run_qa_ods_parquet_schema_p0:
                call: run_bigquery_task
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  sql_path: "sql/qa/06_ods_parquet_schema_checks.sql"
                  query_parameters:
                    - name: "priority_filter"
                      type: "STRING"
                      value: "P0"
                  location: ${bq_location}
                  business_date: ${business_date}
                  date_from: ${date_from}
                  date_to: ${date_to}
                  run_label: ${run_label}
                  warehouse_mode: ${warehouse_mode}
                  transform_backend: ${transform_backend}
                  workflow_id: ${workflow_id}
                  workflow_execution_id: ${workflow_execution_id}
                  orchestration_log_url: ${orchestration_log_url}
            - heartbeat_after_qa_ods_parquet_schema_p0:
                call: heartbeat_lock
                args:
                  control_service_url: ${control_service_url}
                  lock_name: ${lock_name}
                  owner: ${lock_owner}
                  lease_seconds: ${lock_lease_seconds}
            - set_task_dim_dim_trade_calendar:
                assign:
                  - current_task_id: "dim.dim_trade_calendar"
                  - current_task_type: "bigquery"
            - run_dim_dim_trade_calendar:
                call: run_bigquery_task
                args:
                  control_service_url: ${control_service_url}
                  dag_id: ${dag_id}
                  pipeline_run_id: ${pipeline_run_id}
                  task_id: ${current_task_id}
                  task_type: ${current_task_type}
                  sql_path: "sql/dim/01_dim_trade_calendar.sql"
                  query_parameters:                    []
                  location: ${bq_location}
                  business_date: ${business_date}
                  date_from: ${date_from}
