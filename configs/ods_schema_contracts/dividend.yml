# ODS Schema Contract: dividend (分红送股)
# P1 priority
# Known mismatch: stk_bo_rate, stk_co_rate (INT->FLOAT64)
source_system: tushare
endpoint: dividend
ods_table: ods_tushare_dividend
gcs_prefix: gs://data-aquarium/a-share/tushare/raw_data/api=dividend/endpoint=dividend
