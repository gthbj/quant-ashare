# ODS Schema Contract: margin (融资融券交易汇总)
# P2 priority
# Known mismatch: rqyl (INT->FLOAT64)
source_system: tushare
endpoint: margin
ods_table: ods_tushare_margin
gcs_prefix: gs://data-aquarium/a-share/tushare/raw_data/api=tushare/endpoint=margin
partition_field: partition_date
priority: P2
consumers: []
